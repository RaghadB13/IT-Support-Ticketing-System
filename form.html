
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>طلب دعم تقني</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
<link rel="icon" href="https://tse4.mm.bing.net/th/id/OIP.yuBkRm3nM9db-40hhJ8HGwHaEo?rs=1&pid=ImgDetMain&o=7&rm=3" type="image/x-icon" />

  <style>

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to left, #e0f2e9, #d1f5db);
      color: #333;
    }
    .container {
      max-width: 700px;
      margin: 40px auto;
      background: #ffffff;
      padding: 30px 25px;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0,0,0,0.1);
    }
    h1, h3 {
      text-align: center;
      margin-bottom: 25px;
      color: #198754;
    }
    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-top: 3px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 1em;
      box-sizing: border-box;
    }
    textarea {
      resize: vertical;
    }
    button {
      background-color: #198754;
      color: white;
      border: none;
      margin-top: 25px;
      font-size: 1.1em;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #146c43;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .card-option {
      background: #f1f5f9;
      border: 2px solid transparent;
      border-radius: 12px;
      text-align: center;
      padding: 20px 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    .card-option:hover {
      background-color: #e4f0fa;
    }
    .card-option.selected {
      border-color: #198754;
      background-color: #e1f3ef;
    }
    .card-option i {
      font-size: 2.2em;
      margin-bottom: 8px;
      color: #198754;
    }
    .card-option span {
      display: block;
      margin-top: 5px;
      font-weight: 600;
      color: #333;
    }
    input[type="radio"] {
      display: none;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 480px) {
      .container {
        margin: 20px;
        padding: 20px 15px;
      }
      h1 {
        font-size: 1.4em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>طلب دعم فني</h1>
    <form action="submit.php" method="POST">

      <h3>نوع المشكلة</h3>
      <div class="card-grid">
        <label class="card-option">
          <input type="radio" name="issue_type" value="كمبيوتر" required />
          <i class="fas fa-desktop"></i>
          <span>كمبيوتر</span>
        </label>

        <label class="card-option">
          <input type="radio" name="issue_type" value="طابعة أو ماسح ضوئي" />
          <i class="fas fa-print"></i>
          <span>طابعة أو ماسح ضوئي</span>
        </label>

        <label class="card-option">
          <input type="radio" name="issue_type" value="ديم تراسل" />
          <i class="fas fa-network-wired"></i>
          <span>ديم, تراسل</span>
        </label>

        <label class="card-option">
          <input type="radio" name="issue_type" value="أخرى" />
          <i class="fas fa-question-circle"></i>
          <span>أخرى</span>
        </label>
      </div>

      <div id="otherDesc" class="hidden">
        <label>وصف المشكلة</label>
        <textarea name="description" rows="4"></textarea>
      </div>

      <label>الاسم</label>
      <input type="text" name="employee_name" required />

      <label>القسم</label>
      <select name="department" required class="form-select mb-2">
        <option value="" disabled selected>اختر القسم</option>
        <option value="رجال">رجال</option>
        <option value="نساء">نساء</option>
      </select>
          <label>تاريخ الطلب</label>
<input type="date" name="request_date" required />

      <label>الإدارة</label>
      <input type="text" name="administration" required />
      
      <label>رقم المكتب</label>
      <input type="number" name="office_number" required />

      <label>رقم التواصل</label>
      <input type="tel" name="phone" pattern="[0-9]+" required />

      <label>البريد الإلكتروني</label>
      <input type="email" name="email" required />
 <label>وصف المشكلة</label>
        <textarea name="description" rows="4"></textarea>


      <button type="submit">إرسال الطلب</button>
    </form>
  </div>

  <script>
    const options = document.querySelectorAll(".card-option");
    const otherDesc = document.getElementById("otherDesc");
    options.forEach(option => {
      option.addEventListener("click", () => {
        options.forEach(o => o.classList.remove("selected"));
        option.classList.add("selected");
        option.querySelector("input").checked = true;
        otherDesc.classList.toggle("hidden", option.querySelector("input").value !== "أخرى");
      });
    });
  </script>
</body>
</html>
